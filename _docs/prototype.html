<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoverFi Protocol — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --signal:#5577FF; --signal-2:#7C97FF;
    --good:#3FB079;
    --bad:#E0564F; --warn:#D9963F;
    --good-2:#5EC795; --bad-soft:rgba(224,86,79,0.13); --warn-soft:rgba(217,150,63,0.14);
    --sans:'IBM Plex Sans','Noto Sans SC',ui-sans-serif,system-ui,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --r-s:2px; --r-m:3px; --r-l:4px;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  /* dark (default) */
  :root,[data-theme="dark"]{
    --ink:#08080A; --surface:#101013; --surface-2:#16161A; --surface-3:#1D1D22;
    --line:rgba(255,255,255,0.08); --line-2:rgba(255,255,255,0.13); --line-3:rgba(255,255,255,0.22);
    --text:#F0F0F2; --text-2:#9B9BA3; --text-3:#5E5E67;
    --signal-soft:rgba(85,119,255,0.12); --good-soft:rgba(63,176,121,0.13);
    --glow:rgba(85,119,255,0.07); --hairtex:rgba(255,255,255,0.012);
    --header-bg:rgba(8,8,10,0.82); --overlay-bg:rgba(5,5,7,0.8);
    --card-shadow:none; --card-shadow-hover:none;
  }
  [data-theme="light"]{
    --ink:#FFFFFF; --surface:#FFFFFF; --surface-2:#F6F7F9; --surface-3:#EDEEF1;
    --line:rgba(17,18,26,0.13); --line-2:rgba(17,18,26,0.20); --line-3:rgba(17,18,26,0.34);
    --text:#14151A; --text-2:#565862; --text-3:#8A8C96;
    --signal-soft:rgba(85,119,255,0.09); --good-soft:rgba(45,150,100,0.11);
    --glow:rgba(85,119,255,0.05); --hairtex:rgba(17,18,26,0.022);
    --header-bg:rgba(255,255,255,0.88); --overlay-bg:rgba(20,21,26,0.42);
    --card-shadow:none; --card-shadow-hover:none;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  html{-webkit-text-size-adjust:100%;}
  body{background:var(--ink);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    transition:background .3s var(--ease),color .3s var(--ease);}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(900px 480px at 78% -8%,var(--glow),transparent 70%);}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  [data-act]{-webkit-tap-highlight-color:transparent;}
  ::selection{background:rgba(85,119,255,0.3);}
  .wrap{width:100%;margin:0 auto;padding:0 40px;}
  .mono{font-family:var(--mono);}
  [data-theme] *{transition:background-color .3s var(--ease),border-color .3s var(--ease),color .25s var(--ease);}

  header.site{position:sticky;top:0;z-index:60;background:var(--header-bg);
    backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--line);}
  .bar{display:flex;align-items:center;height:64px;gap:12px;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-0.02em;font-size:17px;flex:none;}
  .brand .p{color:var(--text-3);font-weight:400;}
  .brand svg{width:25px;height:25px;color:var(--text);}
  .grow{flex:1;}

  /* desktop inline nav */
  .navlinks{display:flex;align-items:center;gap:2px;margin-left:14px;}
  .navlinks a{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text-2);
    padding:8px 13px;border-radius:var(--r-s);cursor:pointer;
    transition:color .15s,background .15s;}
  .navlinks a:hover{color:var(--text);}
  .navlinks a.on{color:var(--text);background:var(--surface-2);}
  .navlinks a .lk{display:flex;color:var(--text-3);}

  #nav-right{display:flex;align-items:center;gap:8px;flex:none;}
  .iconbtn{width:38px;height:38px;border:1px solid var(--line-2);border-radius:var(--r-s);
    display:flex;align-items:center;justify-content:center;color:var(--text-2);flex:none;
    transition:border-color .15s,color .15s,background .15s;-webkit-tap-highlight-color:transparent;}
  .iconbtn:hover{border-color:var(--line-3);color:var(--text);}
  .iconbtn:active{transform:scale(.96);}
  .seg{display:flex;border:1px solid var(--line-2);border-radius:var(--r-s);overflow:hidden;flex:none;}
  .seg button{padding:8px 14px;font-size:13px;font-family:var(--mono);color:var(--text-3);
    transition:.15s;-webkit-tap-highlight-color:transparent;}
  .seg button.on{background:var(--surface-2);color:var(--text);}
  .addr{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:13px;
    border:1px solid var(--line-2);border-radius:var(--r-s);padding:8px 12px;transition:border-color .15s;}
  .addr:hover{border-color:var(--line-3);}
  .addr .live{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 0 3px var(--good-soft);}

  /* burger: desktop hidden, mobile shown */
  .burger{display:none;width:38px;height:38px;border:1px solid var(--line-2);border-radius:var(--r-s);
    align-items:center;justify-content:center;flex:none;
    transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent;}
  .burger:hover{border-color:var(--line-3);background:var(--surface-2);}
  .burger:active{transform:scale(.96);}
  .burger span{display:block;width:15px;height:1.5px;background:var(--text);position:relative;}
  .burger span::before,.burger span::after{content:"";position:absolute;left:0;width:15px;height:1.5px;background:var(--text);}
  .burger span::before{top:-5px;}.burger span::after{top:5px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--r-s);
    padding:10px 17px;font-size:14px;font-weight:500;
    transition:transform .14s var(--ease),background .15s,border-color .15s,
      box-shadow .2s var(--ease),opacity .15s;white-space:nowrap;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--text);color:var(--ink);font-weight:600;}
  .btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);
    box-shadow:0 8px 20px -8px rgba(0,0,0,0.5);}
  .btn-ghost{border:1px solid var(--line-2);color:var(--text);}
  .btn-ghost:hover{border-color:var(--line-3);background:var(--surface-2);}
  .btn-sm{padding:8px 13px;font-size:13px;}
  .btn-block{width:100%;padding:13px;}
  .btn[disabled]{opacity:.35;cursor:not-allowed;}
  .btn[disabled]:hover{transform:none;box-shadow:none;}

  /* drawer (slides from left) */
  .drawer{position:fixed;inset:0;z-index:55;background:var(--overlay-bg);backdrop-filter:blur(4px);
    opacity:0;pointer-events:none;transition:opacity .22s;}
  .drawer.open{opacity:1;pointer-events:auto;}
  .drawer-panel{position:absolute;top:0;left:0;bottom:0;width:min(86vw,340px);
    background:var(--surface);border-right:1px solid var(--line-2);
    padding:78px 18px calc(20px + env(safe-area-inset-bottom,0));
    display:flex;flex-direction:column;
    transform:translateX(-100%);transition:transform .3s var(--ease);
    overflow-y:auto;}
  .drawer.open .drawer-panel{transform:none;}
  .d-sec{display:flex;flex-direction:column;gap:2px;}
  .dnav{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:var(--r-m);
    color:var(--text-2);cursor:pointer;transition:background .15s,color .15s;
    -webkit-tap-highlight-color:transparent;min-height:48px;}
  .dnav:active{background:var(--surface-2);}
  .dnav.on{background:var(--surface-2);color:var(--text);}
  .dnav .dn-ic{width:20px;height:20px;display:flex;align-items:center;justify-content:center;
    color:var(--text-3);flex:none;}
  .dnav.on .dn-ic{color:var(--signal);}
  .dnav .dn-l{font-size:15px;font-weight:500;}
  .dnav .dlk{margin-left:6px;color:var(--text-3);display:flex;}
  .dnav .dn-arr{margin-left:auto;color:var(--text-3);}
  .d-divider{height:1px;background:var(--line);margin:14px 4px;}
  .d-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:7px 12px;}
  .d-row-l{font-size:14px;color:var(--text-2);}
  .d-foot{margin-top:auto;padding-top:20px;}
  .d-wallet{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12.5px;
    color:var(--text-2);padding:10px 12px;border:1px solid var(--line);border-radius:var(--r-s);
    margin-bottom:9px;}
  .d-wallet .live{width:6px;height:6px;border-radius:50%;background:var(--good);
    box-shadow:0 0 0 3px var(--good-soft);flex:none;}
  .d-wallet .d-bal{margin-left:auto;color:var(--text-3);}

  .hero{position:relative;overflow:hidden;padding:56px 0 84px;}
  .hero-grid-bg{position:absolute;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:44px 44px;
    -webkit-mask-image:radial-gradient(ellipse 80% 75% at 70% 25%,#000,transparent 75%);
    mask-image:radial-gradient(ellipse 80% 75% at 70% 25%,#000,transparent 75%);
    opacity:.7;}
  .hero-cols{position:relative;z-index:1;display:grid;
    grid-template-columns:1.05fr 0.92fr;gap:56px;align-items:center;}
  .hero-in{min-width:0;}
  .hero-eyebrow{display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--text-2);border:1px solid var(--line-2);border-radius:2px;
    padding:6px 11px;margin-bottom:22px;}
  .hero-eyebrow .he-dot{width:6px;height:6px;border-radius:1px;background:var(--signal);flex:none;}
  h1.h1{font-size:clamp(34px,3.8vw,52px);font-weight:600;letter-spacing:-0.035em;
    line-height:1.05;margin:0 0 18px;}
  .lede{font-size:16.5px;line-height:1.55;color:var(--text-2);max-width:520px;}
  .cta-row{display:flex;gap:11px;margin-top:26px;flex-wrap:wrap;}
  .hero-by{display:flex;align-items:center;gap:11px;margin-top:26px;}
  .hero-by-l{font-family:var(--mono);font-size:11px;color:var(--text-3);
    letter-spacing:0.06em;text-transform:uppercase;}
  .hero-by-m{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;
    letter-spacing:-0.005em;color:var(--text);
    border:1px solid var(--line-2);border-radius:2px;padding:6px 12px 6px 9px;
    background:var(--surface);}
  .hero-by-m svg{width:18px;height:18px;color:var(--text);}

  /* hero key visual — diagonal stacked policy cards */
  .hero-visual{min-width:0;display:flex;align-items:center;justify-content:center;
    transform:translateY(96px);}
  .hv2-stage{position:relative;width:100%;max-width:432px;
    padding:30px 26px 38px;
    background:radial-gradient(ellipse 72% 60% at 50% 48%,var(--signal-soft),transparent 72%);}
  .hv2-deck{position:relative;}

  .hv2-card{border:1px solid var(--line-3);border-radius:var(--r-m);
    background:var(--surface);padding:16px 17px 15px;
    transition:transform .32s var(--ease),box-shadow .32s var(--ease);}
  /* diagonal stack: front card anchors bottom-left, others offset up-right */
  .hv2-card-c,.hv2-card-b{position:absolute;left:0;right:0;}
  .hv2-card-c{transform:translate(58px,-66px) scale(0.9);
    opacity:0.5;z-index:1;
    box-shadow:0 12px 26px -16px rgba(0,0,0,0.4);}
  .hv2-card-b{transform:translate(29px,-33px) scale(0.95);
    opacity:0.78;z-index:2;
    box-shadow:0 15px 30px -18px rgba(0,0,0,0.46);}
  .hv2-card-a{position:relative;z-index:3;
    box-shadow:0 28px 52px -22px rgba(0,0,0,0.58),0 5px 16px -5px rgba(0,0,0,0.34);}
  .hv2-deck:hover .hv2-card-c{transform:translate(70px,-78px) scale(0.9);}
  .hv2-deck:hover .hv2-card-b{transform:translate(35px,-39px) scale(0.95);}
  .hv2-deck:hover .hv2-card-a{transform:translate(-6px,6px);}

  .hv2-c-head{display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .hv2-c-brand{display:flex;align-items:center;gap:7px;min-width:0;}
  .hv2-c-mark{width:14px;height:14px;color:var(--text-2);flex:none;}
  .hv2-c-id{font-family:var(--mono);font-size:9.5px;letter-spacing:0.05em;color:var(--text-3);}
  .hv2-c-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);
    font-size:8px;letter-spacing:0.06em;text-transform:uppercase;
    border-radius:2px;padding:3px 6px;white-space:nowrap;flex:none;}
  .hv2-c-badge.b-sig{color:var(--signal-2);border:1px solid rgba(85,119,255,0.4);
    background:var(--signal-soft);}
  .hv2-c-badge.b-good{color:var(--good);border:1px solid rgba(63,176,121,0.36);
    background:var(--good-soft);}
  .hv2-c-badge.b-mut{color:var(--text-2);border:1px solid var(--line-2);}
  .hv2-c-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
  .hv2-c-dot.live{animation:pulse 2s infinite;}
  .hv2-c-mkt{font-size:13px;font-weight:600;letter-spacing:-0.01em;line-height:1.36;
    color:var(--text);margin-top:12px;}
  .hv2-c-div{height:1px;background:var(--line);margin:12px 0;}
  .hv2-c-figs{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .hv2-c-k{font-family:var(--mono);font-size:8.5px;letter-spacing:0.07em;
    text-transform:uppercase;color:var(--text-3);display:block;}
  .hv2-c-v{font-family:var(--mono);font-size:18px;font-weight:600;letter-spacing:-0.01em;
    color:var(--text);margin-top:5px;display:block;font-variant-numeric:tabular-nums;}
  .hv2-c-v i{font-size:9.5px;font-style:normal;color:var(--text-3);font-weight:400;}
  .hv2-c-v.accent{color:var(--signal-2);}
  .hv2-c-rel{margin-top:13px;}
  .hv2-c-rel-top{display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:7px;}
  .hv2-c-rel-pct{font-family:var(--mono);font-size:10px;font-weight:600;
    color:var(--signal-2);font-variant-numeric:tabular-nums;}
  .hv2-c-bar{height:5px;border-radius:1px;background:var(--surface-3);overflow:hidden;
    border:1px solid var(--line);}
  .hv2-c-bar i{display:block;height:100%;width:63%;background:var(--signal);
    border-radius:1px;animation:hv2bar 1.15s cubic-bezier(.22,.61,.36,1) .5s both;}
  .hv2-c-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;
    margin-top:13px;padding-top:11px;border-top:1px solid var(--line);
    font-family:var(--mono);font-size:8.5px;letter-spacing:0.05em;
    text-transform:uppercase;color:var(--text-3);}
  .hv2-c-foot b{font-weight:400;color:var(--text-2);}
  .hv2-c-mini{display:flex;align-items:baseline;justify-content:space-between;gap:8px;
    margin-top:9px;}
  .hv2-c-mini .mv{font-family:var(--mono);font-size:13px;font-weight:600;
    color:var(--text);font-variant-numeric:tabular-nums;}
  .hv2-c-mini .mv i{font-size:8.5px;font-style:normal;color:var(--text-3);font-weight:400;}
  .hv2-c-mini .mk{font-family:var(--mono);font-size:8px;letter-spacing:0.06em;
    text-transform:uppercase;color:var(--text-3);}
  @keyframes hv2bar{from{width:0;}to{width:63%;}}
  @media(prefers-reduced-motion:reduce){
    .hv2-c-bar i{animation:none;}.hv2-c-dot.live{animation:none;}
  }

  /* metric band — quiet peak between hero and how-it-works */
  .metricband{border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    background:var(--surface);position:relative;overflow:hidden;}
  .metricband::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--signal),transparent);
    opacity:0.5;}
  .mb-grid{display:grid;grid-template-columns:repeat(4,1fr);}
  .mb-cell{padding:26px 24px 26px 0;position:relative;}
  .mb-cell+.mb-cell{padding-left:24px;}
  .mb-cell+.mb-cell::before{content:"";position:absolute;left:0;top:50%;
    transform:translateY(-50%);width:1px;height:36px;background:var(--line);}
  .mb-v{font-family:var(--mono);font-size:26px;font-weight:600;letter-spacing:-0.02em;
    line-height:1;font-variant-numeric:tabular-nums;color:var(--text);
    display:flex;align-items:baseline;}
  .mb-cell:first-child .mb-v{color:var(--signal-2);}
  .mb-l{font-size:12px;color:var(--text-2);margin-top:11px;line-height:1.4;
    letter-spacing:-0.005em;}

  section.block{padding:74px 0;border-top:1px solid var(--line);position:relative;}
  .metricband+section.block{border-top:none;}
  /* motif texture — faint, only on accented sections */
  .block.motif-bg{overflow:hidden;}
  .block.motif-bg::before{content:"";position:absolute;z-index:0;
    width:340px;height:340px;right:-90px;top:-90px;pointer-events:none;
    background-image:
      repeating-linear-gradient(0deg,transparent 0 38px,var(--line) 38px 39px),
      repeating-linear-gradient(90deg,transparent 0 38px,var(--line) 38px 39px);
    -webkit-mask-image:radial-gradient(circle at 70% 30%,#000,transparent 70%);
    mask-image:radial-gradient(circle at 70% 30%,#000,transparent 70%);
    opacity:0.6;}
  .block.motif-bg>.wrap{position:relative;z-index:1;}
  .lbl{font-family:var(--mono);font-size:11px;color:var(--text-3);letter-spacing:0.09em;
    text-transform:uppercase;display:flex;align-items:center;gap:11px;margin-bottom:28px;}
  .lbl::before{content:"";width:13px;height:13px;flex:none;border-radius:3px;
    border:1px solid var(--line-3);
    background:
      linear-gradient(var(--signal),var(--signal)) no-repeat 2.5px 2.5px;
    background-size:4px 4px;}
  .lbl::after{content:"";flex:1;height:1px;background:var(--line-2);}
  .h2{font-size:clamp(22px,3vw,29px);font-weight:600;letter-spacing:-0.025em;}
  .sectlede{font-size:15px;color:var(--text-2);max-width:540px;margin:8px 0 30px;}

  /* how-it-works — steady, structured step cards */
  .flow{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
    margin-top:8px;}
  .flow-step{position:relative;background:var(--surface);
    border:1px solid var(--line-2);border-radius:var(--r-m);
    padding:32px 26px 26px;display:flex;flex-direction:column;align-items:center;
    text-align:center;transition:border-color .25s var(--ease),transform .25s var(--ease);}
  .flow-step:hover{border-color:var(--line-3);transform:translateY(-3px);}
  /* top accent line — lights up on scroll, sequentially */
  .flow-step::before{content:"";position:absolute;left:-1px;right:-1px;top:-1px;
    height:2px;background:var(--signal);border-radius:var(--r-m) var(--r-m) 0 0;
    transform:scaleX(0);transform-origin:left;
    transition:transform .6s cubic-bezier(.22,.61,.36,1);}
  .flow.lit .flow-step::before{transform:scaleX(1);}
  .flow.lit .flow-step:nth-child(2)::before{transition-delay:.16s;}
  .flow.lit .flow-step:nth-child(3)::before{transition-delay:.32s;}
  /* sequence number */
  .fs-seq{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;
    color:var(--text-3);margin-bottom:20px;}
  .fs-seq b{color:var(--signal-2);font-weight:500;}
  /* steady icon badge — concentric, symmetric */
  .fs-badge{position:relative;width:74px;height:74px;margin-bottom:22px;
    display:flex;align-items:center;justify-content:center;flex:none;}
  .fs-badge::before{content:"";position:absolute;inset:0;border-radius:var(--r-m);
    border:1px solid var(--line-2);}
  .fs-badge::after{content:"";position:absolute;inset:9px;border-radius:6px;
    background:var(--signal-soft);border:1px solid rgba(85,119,255,0.22);}
  .fs-badge svg{position:relative;z-index:1;width:30px;height:30px;color:var(--signal);}
  .fs-body{display:flex;flex-direction:column;align-items:center;flex:1;width:100%;}
  .fs-body h3{font-size:16.5px;font-weight:600;letter-spacing:-0.015em;
    margin-bottom:9px;}
  .fs-body p{font-size:13.5px;color:var(--text-2);line-height:1.6;
    max-width:248px;flex:1;}
  .fs-meta{margin-top:20px;padding-top:16px;width:100%;
    border-top:1px solid var(--line);
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:0.05em;
    text-transform:uppercase;color:var(--text-3);}
  .fs-meta .fm-dot{width:5px;height:5px;border-radius:1px;background:var(--signal);
    flex:none;}
  /* connecting markers between cards */
  .flow-link{position:absolute;top:50px;width:16px;height:16px;z-index:2;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-3);}
  .flow-link svg{width:13px;height:13px;}
  .flow-link.fl-1{left:calc(33.333% - 8px);}
  .flow-link.fl-2{left:calc(66.666% - 8px);}

  /* coverage values — feature + supporting grid */
  .valwrap{display:grid;grid-template-columns:1.04fr 1fr;gap:16px;align-items:stretch;}
  .val-feature{position:relative;background:var(--surface);
    border:1px solid var(--line-2);border-radius:var(--r-m);
    padding:30px 30px 28px;overflow:hidden;
    display:flex;flex-direction:column;
    transition:border-color .25s var(--ease);}
  .val-feature:hover{border-color:var(--line-3);}
  /* faint brand-motif watermark in the feature card */
  .vf-motif{position:absolute;right:-44px;top:-44px;width:230px;height:230px;
    pointer-events:none;}
  .vf-motif .vfm-fr{fill:none;stroke:var(--text);stroke-width:4;stroke-opacity:0.06;}
  .vf-motif .vfm-sq{fill:var(--signal);fill-opacity:0.05;}
  .vf-tag{position:relative;font-family:var(--mono);font-size:10.5px;
    letter-spacing:0.1em;text-transform:uppercase;color:var(--signal-2);
    display:inline-flex;align-items:center;gap:8px;margin-bottom:auto;}
  .vf-tag .vft-dot{width:5px;height:5px;border-radius:1px;background:var(--signal);}
  .vf-icon{position:relative;width:52px;height:52px;border:1px solid var(--line-2);
    border-radius:var(--r-m);display:flex;align-items:center;justify-content:center;
    color:var(--signal);margin:30px 0 20px;}
  .vf-icon::after{content:"";position:absolute;inset:7px;border-radius:5px;
    background:var(--signal-soft);}
  .vf-icon svg{position:relative;z-index:1;width:24px;height:24px;}
  .vf-h{position:relative;font-size:22px;font-weight:600;letter-spacing:-0.025em;
    margin-bottom:10px;}
  .vf-p{position:relative;font-size:14px;color:var(--text-2);line-height:1.6;
    max-width:380px;}
  /* supporting list — three compact rows */
  .val-list{display:flex;flex-direction:column;gap:0;
    border:1px solid var(--line-2);border-radius:var(--r-m);overflow:hidden;
    background:var(--surface);}
  .val-row{display:flex;align-items:flex-start;gap:16px;padding:21px 22px;
    border-bottom:1px solid var(--line);transition:background .2s var(--ease);}
  .val-row:last-child{border-bottom:none;}
  .val-row:hover{background:var(--surface-2);}
  .vr-icon{width:38px;height:38px;border:1px solid var(--line-2);border-radius:var(--r-s);
    display:flex;align-items:center;justify-content:center;color:var(--text-2);
    flex:none;transition:color .2s var(--ease),border-color .2s var(--ease);}
  .val-row:hover .vr-icon{color:var(--signal);border-color:rgba(85,119,255,0.34);}
  .vr-icon svg{width:19px;height:19px;}
  .vr-body{flex:1;min-width:0;padding-top:1px;}
  .vr-h{font-size:14.5px;font-weight:600;letter-spacing:-0.01em;margin-bottom:4px;}
  .vr-p{font-size:12.5px;color:var(--text-2);line-height:1.55;}
  .vr-idx{font-family:var(--mono);font-size:10px;color:var(--text-3);
    letter-spacing:0.06em;flex:none;padding-top:3px;}

  .market-card{display:flex;align-items:center;gap:18px;border:1px solid var(--line-2);
    border-radius:var(--r-m);padding:22px;background:var(--surface);
    transition:border-color .2s var(--ease),background .2s var(--ease);}
  .market-card:hover{border-color:var(--line-3);background:var(--surface-2);}
  .market-logo{width:52px;height:52px;border-radius:var(--r-s);flex:none;
    background:var(--surface-2);border:1px solid var(--line-2);
    display:flex;align-items:center;justify-content:center;}
  .market-logo svg{width:30px;height:30px;color:var(--text);}
  .market-body{flex:1;min-width:0;}
  .market-name{font-size:16px;font-weight:600;letter-spacing:-0.01em;}
  .market-desc{font-size:13px;color:var(--text-2);margin-top:5px;line-height:1.55;}
  .market-status{display:inline-flex;align-items:center;gap:7px;flex:none;
    font-family:var(--mono);font-size:10.5px;color:var(--good);letter-spacing:0.05em;
    text-transform:uppercase;
    border:1px solid rgba(63,176,121,0.34);background:var(--good-soft);
    border-radius:var(--r-s);padding:6px 11px;}
  .market-status .ms-dot{width:6px;height:6px;border-radius:1px;background:var(--good);}
  .market-note{font-family:var(--mono);font-size:11.5px;color:var(--text-3);margin-top:16px;
    letter-spacing:0.02em;}

  .faqwrap{border:1px solid var(--line-2);border-radius:var(--r-m);overflow:hidden;
    background:var(--surface);}
  .faq-item{border-top:1px solid var(--line);transition:background .2s var(--ease);}
  .faq-item:first-child{border-top:none;}
  .faq-item:last-child{border-bottom:none;}
  .faq-item:hover{background:var(--surface-2);}
  .faq-item.open{background:var(--surface-2);}
  .q{display:flex;justify-content:space-between;gap:20px;padding:20px 16px;
    font-size:15px;font-weight:600;letter-spacing:-0.01em;transition:color .15s;
    cursor:pointer;}
  .q .pm{color:var(--text-3);font-family:var(--mono);font-size:18px;
    transition:transform .25s var(--ease),color .2s;flex:none;line-height:1;}
  .faq-item.open .pm{transform:rotate(45deg);color:var(--signal);}
  .ans{max-height:0;overflow:hidden;transition:max-height .3s var(--ease);}
  .ans-in{padding:0 16px 22px;font-size:13.5px;color:var(--text-2);max-width:680px;
    line-height:1.62;}
  .faq-item.open .ans{max-height:320px;}

  /* footer — brand closing */
  footer.site{border-top:1px solid var(--line);position:relative;overflow:hidden;
    background:var(--surface);}
  footer.site::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;
    background:linear-gradient(90deg,transparent,var(--signal),transparent);opacity:0.4;}
  .foot-mark{position:absolute;left:50%;bottom:-150px;transform:translateX(-50%);
    width:420px;height:420px;pointer-events:none;}
  .foot-mark .fm-fr{fill:none;stroke:var(--text);stroke-width:4;stroke-opacity:0.05;}
  .foot-mark .fm-sq{fill:var(--signal);fill-opacity:0.04;}
  .foot-in{position:relative;z-index:1;padding:54px 0 46px;}
  .foot-top{display:flex;justify-content:space-between;align-items:flex-start;
    gap:32px;flex-wrap:wrap;padding-bottom:34px;border-bottom:1px solid var(--line);}
  .foot-brand-blk{max-width:340px;}
  .foot-brand{display:flex;align-items:center;gap:10px;font-weight:600;
    letter-spacing:-0.02em;font-size:17px;}
  .foot-brand svg{width:24px;height:24px;color:var(--text);}
  .foot-brand .fb-p{color:var(--text-3);font-weight:400;}
  .foot-tag{font-size:13px;color:var(--text-2);line-height:1.6;margin-top:14px;}
  .foot-cols{display:flex;gap:56px;flex-wrap:wrap;}
  .foot-col-h{font-family:var(--mono);font-size:10.5px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--text-3);margin-bottom:14px;}
  .foot-col a{display:block;font-size:13px;color:var(--text-2);padding:5px 0;
    transition:color .15s;cursor:pointer;}
  .foot-col a:hover{color:var(--text);}
  .foot-bottom{display:flex;justify-content:space-between;align-items:center;
    gap:16px;flex-wrap:wrap;padding-top:24px;}
  .foot-meta{font-family:var(--mono);font-size:11px;color:var(--text-3);
    letter-spacing:0.03em;}
  .foot-status{display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:0.05em;
    text-transform:uppercase;color:var(--good);
    border:1px solid rgba(63,176,121,0.3);background:var(--good-soft);
    border-radius:var(--r-s);padding:5px 10px;}
  .foot-status .fs-d{width:6px;height:6px;border-radius:50%;background:var(--good);
    box-shadow:0 0 0 3px var(--good-soft);}

  .page{padding-top:42px;padding-bottom:96px;}
  .page-head{margin-bottom:26px;}
  .crumb{font-family:var(--mono);font-size:12px;color:var(--text-3);margin-bottom:14px;}
  .crumb a:hover{color:var(--text-2);}
  .pagetitle{font-size:26px;font-weight:600;letter-spacing:-0.03em;}
  .pagesub{font-size:14px;color:var(--text-2);margin-top:6px;max-width:640px;}
  .paramline{display:inline-flex;gap:14px;flex-wrap:wrap;font-family:var(--mono);font-size:12px;
    color:var(--text-3);margin-top:14px;border:1px solid var(--line);border-radius:var(--r-s);padding:8px 12px;}
  .paramline b{color:var(--text-2);font-weight:400;}

  /* ===== unified card system =====
     border:   --line-2 default / --line-3 on hover
     radius:   --r-m
     hover:    border lift + surface-2 wash, .2s ease  */
  .card{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-m);}
  .row-card{padding:17px 19px;display:flex;align-items:center;gap:18px;margin-bottom:9px;
    flex-wrap:wrap;transition:border-color .2s var(--ease),background .2s var(--ease);}
  .row-card.clk{cursor:pointer;}
  .row-card.clk:hover{border-color:var(--line-3);background:var(--surface-2);}
  .row-card .main{flex:1;min-width:180px;}
  .row-card .cat{font-family:var(--mono);font-size:10.5px;color:var(--text-3);
    letter-spacing:0.05em;text-transform:uppercase;}
  .row-card .mkt{font-size:14.5px;font-weight:600;margin:6px 0 10px;letter-spacing:-0.01em;}
  .row-card .sub{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
  .chip{font-family:var(--mono);font-size:10px;color:var(--text-2);background:transparent;
    border:1px solid var(--line-2);border-radius:var(--r-s);padding:3px 7px;
    letter-spacing:0.04em;text-transform:uppercase;}
  .row-card .endcol{text-align:right;min-width:122px;}
  .endcol .el{font-size:9.5px;color:var(--text-3);font-family:var(--mono);
    letter-spacing:0.07em;text-transform:uppercase;}
  .endcol .ev{font-size:19px;font-weight:600;margin-top:4px;letter-spacing:-0.01em;
    font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .endcol .eu{font-size:9.5px;color:var(--text-3);font-family:var(--mono);letter-spacing:0.04em;}

  .badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;
    padding:3px 7px;border-radius:2px;border:1px solid var(--line-2);color:var(--text-2);
    letter-spacing:0.04em;text-transform:uppercase;}
  .badge .d{width:5px;height:5px;border-radius:1px;background:currentColor;}
  .badge.b-sig{color:var(--signal-2);border-color:rgba(85,119,255,0.38);background:var(--signal-soft);}
  .badge.b-good{color:var(--good);border-color:rgba(63,176,121,0.36);background:var(--good-soft);}

  .grid2{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;align-items:start;}
  .panel{padding:24px;}
  .panel h4{font-family:var(--mono);font-size:11px;color:var(--text-3);letter-spacing:0.07em;
    text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
  .panel h4::before{content:"";width:11px;height:11px;flex:none;border-radius:2px;
    border:1px solid var(--line-3);
    background:linear-gradient(var(--signal),var(--signal)) no-repeat 2px 2px;
    background-size:3.4px 3.4px;}
  .panel h4::after{content:"";flex:1;height:1px;background:var(--line);}

  .paycover{display:flex;align-items:stretch;gap:0;border:1px solid var(--line-2);
    border-radius:var(--r-m);overflow:hidden;margin-bottom:18px;background:var(--surface);}
  .pc-cell{flex:1;padding:16px 18px;}
  .pc-cell.pc-cover{background:var(--signal-soft);border-left:1px solid var(--line-2);}
  .pc-l{font-family:var(--mono);font-size:10.5px;color:var(--text-3);
    letter-spacing:0.06em;text-transform:uppercase;}
  .pc-v{font-size:24px;font-weight:600;letter-spacing:-0.01em;margin-top:8px;
    display:flex;align-items:baseline;gap:5px;
    font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .pc-cover .pc-v{color:var(--signal-2);}
  .pc-u{font-size:11px;font-weight:400;color:var(--text-3);font-family:var(--mono);}
  .pc-arrow{display:flex;align-items:center;color:var(--text-3);padding:0 2px;flex:none;}

  .terms{width:100%;border-collapse:collapse;}
  .terms tr{border-top:1px solid var(--line);}
  .terms tr:first-child{border-top:none;}
  .terms td{padding:11px 0;font-size:13.5px;vertical-align:top;}
  .terms td:first-child{color:var(--text-2);font-family:var(--mono);font-size:12px;
    letter-spacing:0.02em;}
  .terms td:last-child{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .terms td .big{font-size:15px;color:var(--text);font-weight:600;}
  .terms .hint{color:var(--text-3);font-size:11px;}

  .notebox{border-radius:var(--r-s);padding:12px 14px;font-size:12.5px;color:var(--text-2);
    background:var(--surface-2);border:1px solid var(--line);margin-top:14px;line-height:1.55;}
  .notebox.on{border-color:rgba(85,119,255,0.4);background:var(--signal-soft);}

  .checklist{list-style:none;}
  .checklist li{font-size:13px;color:var(--text-2);padding:7px 0 7px 24px;position:relative;}
  .checklist li::before{content:"";position:absolute;left:0;top:12px;width:9px;height:9px;
    border:1.5px solid var(--text-3);border-radius:2px;}
  .checklist li::after{content:"";position:absolute;left:3px;top:14px;width:4px;height:7px;
    border:solid var(--signal);border-width:0 1.5px 1.5px 0;transform:rotate(42deg);}

  .cert{border:1px solid var(--line-2);border-radius:var(--r-m);overflow:hidden;
    background:var(--surface);}
  .cert-top{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;
    justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;
    background:repeating-linear-gradient(135deg,transparent,transparent 9px,var(--hairtex) 9px,var(--hairtex) 10px);}
  .cert-top .pidl{font-family:var(--mono);font-size:11px;color:var(--text-3);}
  .cert-top .pid{font-family:var(--mono);font-size:19px;letter-spacing:-0.01em;margin-top:2px;}
  .cert-body{padding:4px 22px 18px;}

  .progress{height:7px;background:var(--surface-3);border-radius:0;overflow:hidden;
    border:1px solid var(--line);}
  .progress .fill{height:100%;background:var(--signal);
    transition:width .5s var(--ease);}
  .progress.g .fill{background:var(--good);}
  .relrow{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin:16px 0;
    border:1px solid var(--line-2);border-radius:var(--r-m);overflow:hidden;}
  .relrow .c{background:var(--surface);border-right:1px solid var(--line);padding:13px 14px;}
  .relrow .c:last-child{border-right:none;}
  .relrow .c .l{font-size:10px;color:var(--text-3);font-family:var(--mono);
    letter-spacing:0.06em;text-transform:uppercase;}
  .relrow .c .v{font-size:18px;font-weight:600;margin-top:6px;letter-spacing:-0.01em;
    font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .relrow .c.acc{background:var(--signal-soft);}
  .relrow .c.acc .v{color:var(--signal-2);}
  .curve{width:100%;height:auto;display:block;}
  .axis{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10.5px;
    color:var(--text-3);margin-top:7px;letter-spacing:0.03em;}

  .timeline{position:relative;}
  .tl{display:flex;gap:13px;padding-bottom:20px;position:relative;}
  .tl:last-child{padding-bottom:0;}
  .tl::before{content:"";position:absolute;left:5.5px;top:15px;bottom:-3px;width:1.5px;background:var(--line-2);}
  .tl:last-child::before{display:none;}
  .tl .dot{width:12px;height:12px;border-radius:1px;border:2px solid var(--text-3);
    background:var(--ink);flex:none;margin-top:2px;z-index:1;}
  .tl.done .dot{background:var(--text-3);border-color:var(--text-3);}
  .tl.now .dot{border-color:var(--signal);background:var(--signal);box-shadow:0 0 0 3px var(--signal-soft);}
  .tl.now.g .dot{border-color:var(--good);background:var(--good);box-shadow:0 0 0 3px var(--good-soft);}
  .tl .tt{font-size:14px;font-weight:500;}
  .tl .td{font-size:11.5px;color:var(--text-3);font-family:var(--mono);margin-top:2px;letter-spacing:0.02em;}
  .tl.future .tt{color:var(--text-3);}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .stat{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-m);
    padding:20px;transition:border-color .2s var(--ease),background .2s var(--ease);}
  .stat:hover{border-color:var(--line-3);background:var(--surface-2);}
  .stat .l{font-family:var(--mono);font-size:10.5px;color:var(--text-3);
    letter-spacing:0.06em;text-transform:uppercase;}
  .stat .v{font-size:25px;font-weight:600;margin-top:11px;letter-spacing:-0.01em;
    font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .stat .v .u{font-size:11px;color:var(--text-3);font-family:var(--mono);font-weight:400;}

  .table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .table th{text-align:left;font-family:var(--mono);font-size:11px;color:var(--text-3);
    font-weight:400;padding:10px 12px;border-bottom:1px solid var(--line);letter-spacing:0.03em;}
  .table td{padding:13px 12px;border-bottom:1px solid var(--line);}
  .table tr:last-child td{border-bottom:none;}
  .table tbody tr.clk{cursor:pointer;transition:background .14s;}
  .table tbody tr.clk:hover{background:var(--surface-2);}

  .ov-lbl{font-family:var(--mono);font-size:11px;color:var(--text-3);letter-spacing:0.09em;
    text-transform:uppercase;margin-bottom:13px;display:flex;align-items:center;gap:12px;}
  .ov-lbl::after{content:"";flex:1;height:1px;background:var(--line-2);}

  .empty{text-align:center;padding:54px 20px;}
  .empty svg{width:34px;height:34px;color:var(--text-3);margin-bottom:14px;}
  .empty .et{font-size:15px;font-weight:500;}
  .empty .ed{font-size:13px;color:var(--text-3);margin-top:5px;}

  .mini-prog{display:flex;align-items:center;gap:9px;margin-top:8px;}
  .mini-prog .pb{flex:1;height:4px;background:var(--surface-3);border-radius:2px;overflow:hidden;max-width:140px;}
  .mini-prog .pb i{display:block;height:100%;background:var(--signal);border-radius:2px;}
  .mini-prog .pt{font-family:var(--mono);font-size:11px;color:var(--text-3);}

  /* ===== portfolio: institutional terminal style ===== */
  .pf-hero{border:1px solid var(--line-2);border-radius:3px;background:var(--surface);overflow:hidden;}
  .pf-hero-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;}
  .pf-hcell{padding:15px 18px;border-right:1px solid var(--line);position:relative;}
  .pf-hcell:last-child{border-right:none;}
  .pf-hcell.lead{background:var(--surface-2);}
  .pf-hcell.lead::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--text-2);}
  .pf-hcell.is-claim::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--signal);}
  .pf-k{font-family:var(--mono);font-size:10.5px;color:var(--text-3);letter-spacing:0.07em;
    text-transform:uppercase;}
  .pf-num{font-family:var(--mono);font-size:25px;font-weight:600;letter-spacing:-0.01em;
    margin-top:10px;line-height:1;font-variant-numeric:tabular-nums;}
  .pf-hcell.lead .pf-num{font-size:29px;}
  .pf-num.sig{color:var(--signal-2);}
  .pf-num .u{font-size:11px;font-weight:400;color:var(--text-3);margin-left:5px;}
  .pf-sub{font-family:var(--mono);font-size:10.5px;color:var(--text-3);margin-top:8px;
    letter-spacing:0.02em;font-variant-numeric:tabular-nums;text-transform:uppercase;}
  .pf-rel{display:flex;align-items:center;gap:14px;padding:12px 18px;
    border-top:1px solid var(--line-2);flex-wrap:wrap;background:var(--surface-2);}
  .pf-rel-meta{font-family:var(--mono);font-size:10.5px;color:var(--text-3);
    letter-spacing:0.07em;text-transform:uppercase;flex:none;}
  .pf-rel-bar{flex:1;min-width:160px;height:6px;border-radius:0;
    background:var(--surface-3);overflow:hidden;position:relative;
    border:1px solid var(--line);}
  .pf-rel-bar i{position:absolute;left:0;top:0;bottom:0;background:var(--signal);}
  .pf-rel-fig{font-family:var(--mono);font-size:11.5px;color:var(--text-2);
    font-variant-numeric:tabular-nums;flex:none;}
  .pf-rel-fig b{color:var(--text);font-weight:600;}
  .pf-rel-pct{font-family:var(--mono);font-size:11.5px;color:var(--signal-2);font-weight:600;
    font-variant-numeric:tabular-nums;flex:none;}
  .pf-rel .btn{border-radius:2px;}

  /* ledger rows — terminal grid */
  .pf-grouphdr{display:flex;align-items:center;gap:10px;margin:22px 0 0;
    padding:7px 12px;background:var(--surface-2);border:1px solid var(--line-2);
    border-bottom:none;border-radius:3px 3px 0 0;}
  .pf-grouphdr .gh-t{font-family:var(--mono);font-size:11px;font-weight:600;
    letter-spacing:0.05em;text-transform:uppercase;}
  .pf-grouphdr .gh-c{font-family:var(--mono);font-size:10.5px;color:var(--text-3);
    border:1px solid var(--line-2);border-radius:2px;padding:0 6px;}
  .pf-grouphdr .gh-line{flex:1;}
  .pf-grouphdr .gh-sum{font-family:var(--mono);font-size:10.5px;color:var(--text-3);
    letter-spacing:0.03em;font-variant-numeric:tabular-nums;}
  .pledger{border:1px solid var(--line-2);border-radius:0 0 3px 3px;overflow:hidden;
    background:var(--surface);}
  .prow{display:grid;grid-template-columns:1fr auto;gap:12px 18px;
    padding:13px 16px 13px 18px;border-bottom:1px solid var(--line);cursor:pointer;
    transition:background .12s;align-items:center;position:relative;}
  .prow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;background:transparent;}
  .prow.s-paying::before{background:var(--signal);}
  .prow.s-paid::before{background:var(--good);}
  .prow.s-covered::before{background:var(--text-3);}
  .prow.s-nopay::before{background:var(--line-3);}
  .prow:last-child{border-bottom:none;}
  .prow:hover{background:var(--surface-2);}
  .prow-main{min-width:0;}
  .prow-top{display:flex;align-items:center;gap:9px;}
  .prow-id{font-family:var(--mono);font-size:10.5px;color:var(--text-3);letter-spacing:0.04em;}
  .prow-mkt{font-size:13.5px;font-weight:500;letter-spacing:-0.005em;margin-top:4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .prow-meta{display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap;}
  .prow-fig{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  .prow-fig .fk{font-family:var(--mono);font-size:9.5px;color:var(--text-3);
    letter-spacing:0.07em;text-transform:uppercase;}
  .prow-fig .fv{font-family:var(--mono);font-size:16px;font-weight:600;
    letter-spacing:-0.01em;margin-top:3px;}
  .prow-fig .fv.sig{color:var(--signal-2);}
  .prow-fig .fu{font-family:var(--mono);font-size:9.5px;color:var(--text-3);margin-left:3px;font-weight:400;}
  .prow-bar{grid-column:1/-1;display:flex;align-items:center;gap:10px;}
  .prow-bar .pbar{flex:1;height:5px;border-radius:0;background:var(--surface-3);
    overflow:hidden;border:1px solid var(--line);}
  .prow-bar .pbar i{display:block;height:100%;background:var(--signal);}
  .prow-bar .pbt{font-family:var(--mono);font-size:10px;color:var(--text-3);
    letter-spacing:0.03em;font-variant-numeric:tabular-nums;flex:none;}
  .tag{font-family:var(--mono);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;
    padding:2px 6px;border-radius:2px;border:1px solid var(--line-2);color:var(--text-2);}
  .prow .badge,.pf-hero .badge{border-radius:2px;}
  .prow .badge .d{border-radius:1px;}

  /* gated / locked preview */
  .gate{position:relative;}
  .gate-blur{filter:blur(7px) saturate(0.7);opacity:.5;pointer-events:none;user-select:none;}
  .gate-veil{position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:center;
    padding-top:96px;}
  .gate-card{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-l);
    padding:30px 30px 26px;max-width:404px;width:100%;text-align:center;
    box-shadow:0 24px 70px rgba(0,0,0,.4);animation:pop .34s var(--ease);}
  .gate-card .gi{width:46px;height:46px;border:1px solid var(--line-2);border-radius:2px;
    display:flex;align-items:center;justify-content:center;color:var(--signal);margin:0 auto 16px;}
  .gate-card h3{font-size:18px;font-weight:600;letter-spacing:-0.02em;}
  .gate-card p{font-size:13.5px;color:var(--text-2);margin:7px 0 18px;}

  .overlay{position:fixed;inset:0;background:var(--overlay-bg);backdrop-filter:blur(5px);
    z-index:90;display:flex;align-items:center;justify-content:center;padding:24px;animation:fade .18s var(--ease);}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .modal{background:var(--surface);border:1px solid var(--line-2);border-radius:var(--r-l);
    max-width:412px;width:100%;animation:pop .24s var(--ease);}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:none;}}
  .modal-h{padding:20px 22px 0;}
  .modal-h h3{font-size:17px;font-weight:600;letter-spacing:-0.01em;}
  .modal-h p{font-size:13px;color:var(--text-2);margin-top:4px;}
  .modal-b{padding:16px 22px 22px;}
  .wallet-opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;
    border:1px solid var(--line-2);border-radius:var(--r-m);padding:14px;margin-top:9px;
    transition:border-color .15s,background .15s,transform .12s var(--ease);}
  .wallet-opt:hover{border-color:var(--line-3);background:var(--surface-2);}
  .wallet-opt:active{transform:scale(.99);}
  .wallet-opt .ic{width:34px;height:34px;border-radius:2px;flex:none;display:flex;
    align-items:center;justify-content:center;font-weight:600;font-size:15px;color:#fff;}
  .wallet-opt .wn{font-size:14px;font-weight:500;}
  .wallet-opt .wd{font-size:11px;color:var(--text-3);font-family:var(--mono);letter-spacing:0.02em;}
  .wallet-opt .arr{margin-left:auto;color:var(--text-3);}
  .spinner{width:32px;height:32px;border:2.5px solid var(--line-2);border-top-color:var(--signal);
    border-radius:50%;animation:spin .8s linear infinite;margin:8px auto 16px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinner-sm{width:13px;height:13px;border:2px solid var(--line-2);border-top-color:var(--signal);
    border-radius:50%;animation:spin .7s linear infinite;display:block;}
  .modal-status{padding:26px 22px;text-align:center;}
  .txsteps{display:flex;flex-direction:column;gap:2px;}
  .txs-row{display:flex;align-items:center;gap:11px;padding:9px 0;}
  .txs-ic{width:20px;height:20px;border-radius:2px;border:1px solid var(--line-2);
    display:flex;align-items:center;justify-content:center;flex:none;
    font-size:11px;color:var(--text-3);}
  .txs-ic.ok{background:var(--good);border-color:var(--good);color:#fff;}
  .txs-ic.wait{opacity:.5;}
  .txs-l{font-size:13px;color:var(--text-2);font-family:var(--mono);letter-spacing:0.02em;}
  .txs-row.done .txs-l{color:var(--text);}
  .txs-row.now .txs-l{color:var(--text);}
  .txs-row.wait .txs-l{color:var(--text-3);}
  .errbox{border:1px solid rgba(224,86,79,0.4);background:var(--bad-soft);
    border-radius:2px;padding:12px 14px;font-size:13px;color:var(--text-2);line-height:1.55;}

  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  .rise{animation:rise .5s var(--ease) both;}
  .rise-2{animation:rise .5s var(--ease) .06s both;}
  .rise-3{animation:rise .5s var(--ease) .12s both;}

  /* scroll-reveal — sections fade up as they enter the viewport */
  .reveal{opacity:0;transform:translateY(22px);
    transition:opacity .66s var(--ease),transform .66s var(--ease);}
  .reveal.seen{opacity:1;transform:none;}
  /* staggered children within a revealed section */
  .reveal .stagger{opacity:0;transform:translateY(16px);
    transition:opacity .55s var(--ease),transform .55s var(--ease);}
  .reveal.seen .stagger{opacity:1;transform:none;}
  .reveal.seen .stagger:nth-child(1){transition-delay:.05s;}
  .reveal.seen .stagger:nth-child(2){transition-delay:.12s;}
  .reveal.seen .stagger:nth-child(3){transition-delay:.19s;}
  .reveal.seen .stagger:nth-child(4){transition-delay:.26s;}

  @media(prefers-reduced-motion:reduce){
    .rise,.rise-2,.rise-3,.skel::after{animation:none;}
    .reveal{opacity:1;transform:none;transition:none;}
    .reveal .stagger{opacity:1;transform:none;transition:none;}
  }

  /* ===== skeleton loading ===== */
  .skel{background:var(--surface-2);border-radius:2px;position:relative;overflow:hidden;}
  .skel::after{content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,var(--hairtex),transparent);
    transform:translateX(-100%);animation:shimmer 1.3s infinite;}
  @keyframes shimmer{100%{transform:translateX(100%);}}
  .skel-row{border:1px solid var(--line-2);border-radius:var(--r-m);padding:17px 19px;
    margin-bottom:9px;background:var(--surface);
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .skel-row .sk-main{flex:1;min-width:180px;display:flex;flex-direction:column;gap:9px;}
  .skel-row .sk-end{display:flex;flex-direction:column;gap:7px;align-items:flex-end;
    min-width:108px;}
  .skel-line{height:11px;}
  .skel-grid{display:grid;grid-template-columns:1fr;gap:9px;}
  /* gated dashboard frame — structure only, no data */
  .skel-dash{border:1px solid var(--line-2);border-radius:3px;background:var(--surface);
    overflow:hidden;margin-bottom:28px;}
  .skel-dash-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;}
  .skel-dash-cell{padding:18px;border-right:1px solid var(--line);
    display:flex;flex-direction:column;gap:11px;}
  .skel-dash-cell:last-child{border-right:none;}
  .skel-dash-cell.lead{background:var(--surface-2);}
  .skel-dash-bar{padding:13px 18px;border-top:1px solid var(--line-2);
    background:var(--surface-2);display:flex;align-items:center;gap:14px;}
  @media(max-width:680px){
    .skel-dash-grid{grid-template-columns:1fr 1fr;}
    .skel-dash-cell:nth-child(2){border-right:none;}
    .skel-dash-cell:nth-child(1),.skel-dash-cell:nth-child(2){
      border-bottom:1px solid var(--line);}
  }

  /* ===== toast variants ===== */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(24px);
    z-index:95;background:var(--surface-3);border:1px solid var(--line-2);border-radius:var(--r-m);
    padding:11px 15px;font-size:13px;font-family:var(--mono);box-shadow:0 12px 40px rgba(0,0,0,.45);
    opacity:0;transition:.24s var(--ease);display:flex;align-items:center;gap:11px;max-width:380px;}
  .toast.show{transform:translateX(-50%);opacity:1;}
  .toast .tdot{width:7px;height:7px;border-radius:1px;background:var(--good);flex:none;}
  .toast.t-err .tdot{background:var(--bad,#e0564f);}
  .toast.t-info .tdot{background:var(--signal);}
  .toast .tbody{min-width:0;}
  .toast .tmain{color:var(--text);}
  .toast .tsub{color:var(--text-3);font-size:11px;margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.02em;}
  .toast .tlink{color:var(--signal-2);text-decoration:none;flex:none;font-size:11px;
    border:1px solid var(--line-2);border-radius:2px;padding:3px 7px;}
  .toast .tlink:hover{border-color:var(--line-3);}

  /* ===== list controls: sort / filter / search ===== */
  .listbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .listbar .lb-search{flex:1;min-width:160px;display:flex;align-items:center;gap:8px;
    border:1px solid var(--line-2);border-radius:2px;padding:0 10px;height:34px;
    background:var(--surface);}
  .listbar .lb-search input{flex:1;border:none;background:none;color:var(--text);
    font-family:var(--mono);font-size:12px;outline:none;min-width:0;}
  .listbar .lb-search input::placeholder{color:var(--text-3);}
  .listbar .lb-search svg{color:var(--text-3);flex:none;}
  .fbtn{font-family:var(--mono);font-size:11px;letter-spacing:0.03em;color:var(--text-2);
    border:1px solid var(--line-2);border-radius:2px;padding:0 11px;height:34px;
    background:var(--surface);transition:border-color .14s,background .14s,color .14s;
    display:inline-flex;align-items:center;gap:6px;text-transform:uppercase;cursor:pointer;}
  .fbtn:hover{border-color:var(--line-3);color:var(--text);}
  .fbtn.on{background:var(--signal-soft);border-color:rgba(85,119,255,0.4);color:var(--signal-2);}
  .fbtn .fb-x{color:var(--text-3);font-size:13px;}
  .sortsel{font-family:var(--mono);font-size:11px;letter-spacing:0.03em;color:var(--text-2);
    border:1px solid var(--line-2);border-radius:2px;height:34px;padding:0 9px;
    background:var(--surface);text-transform:uppercase;cursor:pointer;outline:none;}
  .listcount{font-family:var(--mono);font-size:11px;color:var(--text-3);
    letter-spacing:0.04em;margin-left:auto;}

  /* ===== activity feed ===== */
  .actfeed{border:1px solid var(--line-2);border-radius:var(--r-m);overflow:hidden;background:var(--surface);}
  .actrow{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
    padding:11px 16px;border-bottom:1px solid var(--line);}
  .actrow:last-child{border-bottom:none;}
  .actrow .aic{width:26px;height:26px;border:1px solid var(--line-2);border-radius:2px;
    display:flex;align-items:center;justify-content:center;color:var(--text-2);flex:none;}
  .actrow.a-in .aic{color:var(--good);}
  .actrow.a-out .aic{color:var(--signal-2);}
  .actrow .at{font-size:13px;}
  .actrow .ad{font-family:var(--mono);font-size:10.5px;color:var(--text-3);
    margin-top:2px;letter-spacing:0.03em;}
  .actrow .av{font-family:var(--mono);font-size:13px;font-weight:600;
    font-variant-numeric:tabular-nums;text-align:right;}
  .actrow .av.pos{color:var(--good);}
  .actrow .av.neg{color:var(--text-2);}

  /* ===== empty states ===== */
  .empty2{border:1px dashed var(--line-2);border-radius:var(--r-m);padding:44px 24px;
    text-align:center;background:var(--surface);}
  .empty2 .e-ic{width:44px;height:44px;border:1px solid var(--line-2);border-radius:2px;
    display:flex;align-items:center;justify-content:center;color:var(--text-3);
    margin:0 auto 16px;}
  .empty2 .e-t{font-size:15px;font-weight:600;}
  .empty2 .e-d{font-size:13px;color:var(--text-3);margin-top:6px;max-width:340px;
    margin-left:auto;margin-right:auto;line-height:1.55;}
  .empty2 .btn{margin-top:18px;}

  /* live indicator */
  .liveupd{font-family:var(--mono);font-size:10.5px;color:var(--text-3);
    letter-spacing:0.04em;display:inline-flex;align-items:center;gap:6px;}
  .liveupd .lu-dot{width:6px;height:6px;border-radius:50%;background:var(--good);
    animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* curve hover tooltip */
  .ctip{position:absolute;pointer-events:none;background:var(--surface-3);
    border:1px solid var(--line-2);border-radius:2px;padding:6px 9px;
    font-family:var(--mono);font-size:10.5px;white-space:nowrap;opacity:0;
    transition:opacity .12s;z-index:5;}
  .ctip .ct-d{color:var(--text-3);}
  .ctip .ct-v{color:var(--text);font-weight:600;margin-top:2px;}
  .cdot{opacity:0;transition:opacity .12s;}

  @media(max-width:860px){
    .grid2,.steps{grid-template-columns:1fr;}
    .flow{grid-template-columns:1fr;gap:14px;}
    .flow-link{display:none;}
    .flow.lit .flow-step:nth-child(2)::before{transition-delay:.1s;}
    .flow.lit .flow-step:nth-child(3)::before{transition-delay:.2s;}
    .hero-cols{grid-template-columns:1fr;gap:34px;}
    .hero-in .lede{max-width:none;}
    .vals{grid-template-columns:1fr 1fr;}
    .val:nth-child(2){border-right:none;}
    .val:nth-child(1),.val:nth-child(2){border-bottom:1px solid var(--line);}
    .stat-grid{grid-template-columns:1fr 1fr;}
    .pf-hero-grid{grid-template-columns:1fr 1fr;}
    .pf-hcell:nth-child(2){border-right:none;}
    .pf-hcell:nth-child(1),.pf-hcell:nth-child(2){border-bottom:1px solid var(--line);}
    .pf-hcell.lead .pf-num{font-size:27px;}
  }

  @media(max-width:680px){
    .wrap{width:100%;padding:0 18px;}
    main{padding-bottom:0;}

    .burger{display:flex;}
    .navlinks{display:none;}
    .seg-desktop,.iconbtn-desktop{display:none;}

    .bar{height:58px;gap:10px;}
    .addr{padding:9px 12px;}

    .hero{padding:28px 0 42px;}
    .hero-cols{grid-template-columns:1fr;gap:28px;}
    .hero-visual{display:none;}
    .hero-grid-bg{background-size:36px 36px;}
    h1.h1{font-size:32px;letter-spacing:-0.03em;line-height:1.08;margin:0 0 14px;}
    .lede{font-size:15.5px;line-height:1.58;}
    .cta-row{gap:10px;margin-top:22px;}
    .cta-row .btn{flex:1;min-width:0;padding:14px;}
    .hv-frame{max-width:none;}
    .mb-grid{grid-template-columns:1fr 1fr;}
    .mb-cell{padding:18px 16px 18px 0;}
    .mb-cell+.mb-cell{padding-left:0;}
    .mb-cell+.mb-cell::before{display:none;}
    .mb-cell:nth-child(even){padding-left:18px;}
    .mb-cell:nth-child(even)::before{content:"";display:block;left:0;}
    .mb-cell:nth-child(3),.mb-cell:nth-child(4){border-top:1px solid var(--line);}
    .mb-v{font-size:22px;}
    .specstrip{grid-template-columns:1fr 1fr;margin-top:28px;}
    .specstrip .s{padding:16px;border-right:1px solid var(--line);}
    .specstrip .s:nth-child(even){border-right:none;}
    .specstrip .s:nth-child(1),.specstrip .s:nth-child(2){border-bottom:1px solid var(--line);}
    .specstrip .sv{font-size:19px;}

    section.block{padding:44px 0;}
    .lbl{margin-bottom:22px;}
    .sectlede{margin-bottom:22px;}
    .h2{font-size:22px;}

    .pf-hero-grid{grid-template-columns:1fr 1fr;}
    .pf-hcell{padding:14px 15px;}
    .pf-hcell:nth-child(odd){border-right:1px solid var(--line);}
    .pf-hcell:nth-child(even){border-right:none;}
    .pf-hcell:nth-child(1),.pf-hcell:nth-child(2){border-bottom:1px solid var(--line);}
    .pf-num{font-size:22px;}
    .pf-hcell.lead .pf-num{font-size:22px;}
    .pf-rel{padding:13px 15px;gap:10px;}
    .pf-rel-bar{min-width:100%;order:3;}
    .pf-rel-fig,.pf-rel-pct{font-size:11px;}
    .pf-rel .btn{width:100%;order:4;}

    .prow{grid-template-columns:1fr;gap:12px;padding:14px 15px;}
    .prow-fig{text-align:left;display:flex;align-items:baseline;gap:8px;
      padding-top:11px;border-top:1px solid var(--line);}
    .prow-fig .fk{order:1;}
    .prow-fig .fv{order:2;font-size:17px;}
    .prow-mkt{white-space:normal;}

    /* coverage section — compact on mobile to avoid excessive height */
    .valwrap{grid-template-columns:1fr;gap:12px;}
    .val-feature{padding:20px 18px;}
    .vf-tag{margin-bottom:0;}
    .vf-icon{width:42px;height:42px;margin:16px 0 13px;}
    .vf-icon svg{width:20px;height:20px;}
    .vf-h{font-size:18px;margin-bottom:7px;}
    .vf-p{font-size:13px;max-width:none;line-height:1.55;}
    .vf-motif{width:150px;height:150px;right:-30px;top:-30px;}
    /* supporting list → compact 2-line rows, no index column */
    .val-row{padding:14px 16px;gap:12px;align-items:flex-start;}
    .vr-icon{width:32px;height:32px;}
    .vr-icon svg{width:16px;height:16px;}
    .vr-body{padding-top:0;}
    .vr-h{font-size:13.5px;margin-bottom:3px;}
    .vr-p{font-size:12px;line-height:1.5;}
    .vr-idx{display:none;}
    .stat-grid{grid-template-columns:1fr 1fr;}

function releaseCurve(p,good){
 const W=560,H=140;const cap=Math.min(p.settledDaysAgo||0,365);
 const relX=(cap/365)*W, relY=H-(cap/365)*H;
 const col=good?'var(--good)':'var(--signal)';
 return `<div class="curve-wrap" style="position:relative;"
     data-curve data-a="${p.a}" data-cap="${cap}" data-w="${W}" data-h="${H}">
   <svg class="curve" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
   <defs><linearGradient id="cv${p.id}" x1="0" y1="0" x2="0" y2="1">
     <stop offset="0" stop-color="${col}" stop-opacity="0.22"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
   <path d="M0 ${H} L${relX} ${relY} L${relX} ${H} Z" fill="url(#cv${p.id})"/>
   <path d="M0 ${H} L${W} 0" stroke="var(--line-3)" stroke-width="1.5" stroke-dasharray="4 5" fill="none"/>
   <path d="M0 ${H} L${relX} ${relY}" stroke="${col}" stroke-width="2.5" fill="none"/>
   <circle cx="${relX}" cy="${relY}" r="4.5" fill="${col}"/>
   <line class="cvline" x1="0" y1="0" x2="0" y2="${H}" stroke="${col}" stroke-width="1" stroke-dasharray="3 3" style="opacity:0"/>
   <circle class="cdot" r="4" fill="${col}" stroke="var(--surface)" stroke-width="1.5"/>
   </svg>
   <div class="ctip"><span class="ct-d"></span><span class="ct-v"></span></div>
 </div>`;
}
function initCurve(){
 const wrap=document.querySelector('[data-curve]');
 if(!wrap) return;
 const t=L();
 const a=parseFloat(wrap.dataset.a), cap=parseFloat(wrap.dataset.cap);
 const W=parseFloat(wrap.dataset.w), H=parseFloat(wrap.dataset.h);
 const svgEl=wrap.querySelector('svg'), line=wrap.querySelector('.cvline');
 const dot=wrap.querySelector('.cdot'), tip=wrap.querySelector('.ctip');
 const move=e=>{
   const r=svgEl.getBoundingClientRect();
   const px=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
   const day=Math.round(px*365);
   const released=day<=cap?a*(day/365):a*(cap/365);
   const sx=px*W, sy=H-(released/a)*H;
   line.setAttribute('x1',sx);line.setAttribute('x2',sx);line.style.opacity=day<=cap?'0.6':'0.25';
   dot.setAttribute('cx',sx);dot.setAttribute('cy',sy);dot.style.opacity=day<=cap?'1':'0.4';
   tip.style.opacity='1';
   tip.querySelector('.ct-d').textContent=t.curveDay+' '+day+' / 365';
   tip.querySelector('.ct-v').textContent=money(released)+' USDC '+t.curveReleased;
   const tx=Math.min(Math.max(e.clientX-r.left-tip.offsetWidth/2,0),r.width-tip.offsetWidth);
   tip.style.left=tx+'px';

function policyTimeline(p){

 steps.push({t:t.tlMinted,d:t.tlInsured(money(p.premium)),cls:'done'});
 if(p.status==='active'){
   steps.push({t:t.tlAwait,d:t.tlMintedAgo(p.mintedDaysAgo),cls:'now'});
   steps.push({t:t.tlSettlement,d:t.tlPending,cls:'future'});
 }else if(p.status==='hit'){
   steps.push({t:t.tlWon,d:t.tlAgo(p.settledDaysAgo),cls:'done'});
   steps.push({t:t.tlClosed,d:t.tlPremKept,cls:'now'});
 }else if(p.status==='void'){
   steps.push({t:t.tlVoided,d:t.tlAgo(p.voidedDaysAgo),cls:'done'});
   steps.push({t:t.tlRefunded,d:t.tlReturned(money(p.premium)),cls:'now'});
 }else{
   steps.push({t:t.tlMissed,d:t.tlAgo(p.settledDaysAgo),cls:'done'});
   steps.push({t:good?t.tlReimbursed:t.tlReleasing,d:good?t.tlDaysFull:t.tlDays(Math.min(p.settledDaysAgo,365)),cls:good?'done g':'now'});
   if(!good) steps.push({t:t.tlRelDone,d:t.day365,cls:'future'});
 }
 return `<div class="timeline">${steps.map(s=>`<div class="tl ${s.cls}"><div class="dot"></div><div><div class="tt">${s.t}</div><div class="td">${s.d}</div></div></div>`).join('')}</div>`;
}

function initFlow(){
 const flow=$('#flow');
 if(!flow) return;
 if(!('IntersectionObserver' in window)){ flow.classList.add('lit'); return; }
 const io=new IntersectionObserver((entries,obs)=>{
   entries.forEach(en=>{
     if(en.isIntersecting){ flow.classList.add('lit'); obs.disconnect(); }
   });
 },{threshold:0.4});
 io.observe(flow);
}
/* count-up: animates the numeric part of a string, keeping prefix/suffix */
function countUp(el){
 const target=el.dataset.count||'';
 const m=target.match(/^([^\d]*)([\d,.]+)(.*)$/);
 if(!m){ return; }
 const prefix=m[1], suffix=m[3];
 const clean=m[2].replace(/,/g,'');
 const end=parseFloat(clean);
 if(isNaN(end)){ return; }
 const decimals=(clean.split('.')[1]||'').length;
 const grouped=m[2].indexOf(',')>-1;
 const dur=1100, t0=performance.now();
 const fmt=v=>{
   let s=v.toFixed(decimals);
   if(grouped) s=parseFloat(s).toLocaleString('en-US',{minimumFractionDigits:decimals,maximumFractionDigits:decimals});
   return prefix+s+suffix;
 };
 const tick=now=>{
   const p=Math.min((now-t0)/dur,1);
   const eased=1-Math.pow(1-p,3);
   el.textContent=fmt(end*eased);
   if(p<1) requestAnimationFrame(tick);
   else el.textContent=target;
 };
 requestAnimationFrame(tick);
}
function initHomeReveal(){
 const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
 const sections=document.querySelectorAll('.reveal');
 if(reduce||!('IntersectionObserver' in window)){
   sections.forEach(s=>s.classList.add('seen'));
   document.querySelectorAll('[data-count]').forEach(el=>{el.textContent=el.dataset.count;});
   return;
 }
 const io=new IntersectionObserver((entries,obs)=>{
   entries.forEach(en=>{
     if(en.isIntersecting){
       en.target.classList.add('seen');
       en.target.querySelectorAll('[data-count]').forEach(el=>countUp(el));
       obs.unobserve(en.target);
     }
   });
 },{threshold:0.18,rootMargin:'0px 0px -8% 0px'});
 sections.forEach(s=>io.observe(s));
}

   <div class="modal-status"><div class="spinner"></div>
   <h3 style="font-size:16px;font-weight:600;">${msg}</h3>
   <p style="font-size:13px;color:var(--text-2);margin-top:5px;">${sub||''}</p></div></div></div>`;
}
function clearLayer(){$('#layer').innerHTML='';}
let toastT;
function toast(msg,opts){
 opts=opts||{};
 const el=$('#toast');
 $('#toast-msg').textContent=msg;
 const sub=$('#toast-sub'), link=$('#toast-link');
 sub.textContent=opts.sub||'';
 sub.style.display=opts.sub?'':'none';
 el.className='toast'+(opts.kind?' t-'+opts.kind:'');
 link.style.display='none';
 el.classList.add('show');
 clearTimeout(toastT);
 toastT=setTimeout(()=>el.classList.remove('show'),opts.long?4200:3000);
}

/* ============ actions ============ */
function connectWallet(name){
 const t=L();
 statusModal(t.cwTitle(name),t.approveConn);
 setTimeout(()=>{
   state.connected=true;
   state.view=(state.pendingView&&state.pendingView!=='home')?state.pendingView:'insurance';
   state.pendingView=null;
   clearLayer();render();
   toast(t.connected(name),{kind:'info',sub:state.address});
 },1100);
}
function pay(){
 const t=L();
 const o=ORDERS.find(x=>x.id===state.selectedOrder);
 if(!o) return;
 const pr=premiumOf(o.a,kOf(o));
 if(pr.payable>state.balance){
   errorModal(t.errInsufTitle,t.errInsufMsg(money(pr.payable),money(state.balance)));
   return;
 }
 statusModal(t.minting,t.mintingSub);
 setTimeout(()=>{
   state.balance-=pr.payable;
   const id='CF-00'+(polCounter++);
   POLICIES.unshift({id,order:o.id,catEn:o.catEn,catZh:o.catZh,mEn:o.mEn,mZh:o.mZh,optEn:o.optEn,optZh:o.optZh,a:o.a,k:kOf(o),premium:pr.payable,status:'active',mintedDaysAgo:0});
   ACTIVITY.unshift({type:'mint',id,amt:pr.payable,mkt:{mEn:o.mEn,mZh:o.mZh},ago:0});
   const idx=ORDERS.findIndex(x=>x.id===o.id);if(idx>-1)ORDERS.splice(idx,1);
   state.selectedOrder=null;state.policyId=id;state.view='policy';
   clearLayer();render();toast(t.minted(id),{kind:'info'});
 },1200);
}
function claim(id){
 const t=L();
 const p=POLICIES.find(x=>x.id===id);const c=claimableOf(p);
 if(c<=0) return;
 statusModal(t.claimingT,t.claimingSub);
 setTimeout(()=>{
   p.claimed=releasedOf(p);
   if(p.claimed>=p.a-0.01)p.status='completed';
   state.balance+=c;
   ACTIVITY.unshift({type:'claim',id:p.id,amt:c,mkt:{mEn:p.mEn,mZh:p.mZh},ago:0});
   clearLayer();render();toast(t.claimedToast(money(c)),{kind:'info'});
 },1050);
}
function batchClaim(){
 const t=L();
 const total=POLICIES.reduce((s,p)=>s+claimableOf(p),0);
 if(total<=0) return;
 const n=POLICIES.filter(p=>claimableOf(p)>0).length;
 statusModal(t.batchT,t.batchSub);
 setTimeout(()=>{
   POLICIES.forEach(p=>{if(claimableOf(p)>0){
     const c=claimableOf(p);
     p.claimed=releasedOf(p);if(p.claimed>=p.a-0.01)p.status='completed';
     ACTIVITY.unshift({type:'claim',id:p.id,amt:c,mkt:{mEn:p.mEn,mZh:p.mZh},ago:0});
   }});
   state.balance+=total;clearLayer();render();
   toast(t.claimedBatch(money(total)),{kind:'info',sub:t.batchDone(n)});
 },1200);
}

/* ============ events ============ */
function refreshOrders(){
 const t=L();
 const lst=$('#orders-list'), cnt=$('#ord-count');
 if(lst) lst.innerHTML=ordersListHtml();
 if(cnt) cnt.textContent=t.resultCount(filteredOrders().length);
}
function refreshPolicies(){
 const lst=$('#policies-list');
 if(lst) lst.innerHTML=portfolioInner();
 document.querySelectorAll('[data-act="pol-filter"]').forEach(b=>{
   b.classList.toggle('on',b.dataset.f===state.polFilter);
 });
}
document.addEventListener('click',e=>{
 const stop=e.target.closest('[data-stop]');
 const el=e.target.closest('[data-act]');
 if(!el){ return; }
 const act=el.dataset.act;
 if(act==='connect'){ state.drawer=false; state.pendingView=state.view; walletModal(); }
 else if(act==='pick-wallet'){ connectWallet(el.dataset.name); }
 else if(act==='close-overlay'){ if(!stop) clearLayer(); }
 else if(act==='drawer-close'){ if(!stop){ state.drawer=false;renderDrawer(); } }
 else if(act==='disconnect'){ state.connected=false;state.view='home';state.drawer=false;render();toast(L().disconnected); }
 else if(act==='nav'){ state.view=el.dataset.view;state.drawer=false;render(); }
 else if(act==='drawer'){ state.drawer=!state.drawer;renderDrawer(); }
 else if(act==='lang'){ state.lang=el.dataset.lang;state._skipSkel=true;render(); }
 else if(act==='settheme'){
   state.theme=el.dataset.theme;
   state.themeManual=true;
   document.body.setAttribute('data-theme',state.theme);
   renderNav();
 }
 else if(act==='anchor'){
   state.drawer=false;
   const go=()=>{const tg=document.getElementById(el.dataset.anchor);if(tg)tg.scrollIntoView({behavior:'smooth',block:'start'});};
   if(state.view!=='home'){state.view='home';render();setTimeout(go,70);}else{renderDrawer();go();}
 }
 else if(act==='faq'){ el.classList.toggle('open'); }
 else if(act==='insure'){ state.selectedOrder=el.dataset.id;state.view='purchase';render(); }
 else if(act==='pay'){ pay(); }
 else if(act==='policy'){ state.policyId=el.dataset.id;state.view='policy';render(); }
 else if(act==='claim'){ claim(el.dataset.id); }
 else if(act==='batch'){ batchClaim(); }
 else if(act==='ord-clear'){ state.ordSearch='';state.ordSort='closes';state._skipSkel=true;render(); }
 else if(act==='pol-clear'){ state.polSearch='';state.polFilter='all';refreshPolicies();
   const s=$('#pol-search');if(s)s.value=''; }
 else if(act==='pol-filter'){ state.polFilter=el.dataset.f;refreshPolicies(); }
});
document.addEventListener('input',e=>{
 if(e.target.id==='ord-search'){ state.ordSearch=e.target.value;refreshOrders(); }
 else if(e.target.id==='pol-search'){ state.polSearch=e.target.value;refreshPolicies(); }
});
document.addEventListener('change',e=>{
 if(e.target.id==='ord-sort'){ state.ordSort=e.target.value;refreshOrders(); }
});
document.addEventListener('keydown',e=>{
 if(e.key==='Escape'){
   if($('#layer').innerHTML){ clearLayer(); }
   else if(state.drawer){ state.drawer=false;renderDrawer(); }
 }
});
let liveT=3;
setInterval(()=>{
 const el=$('#live-ts');
 if(el){ liveT=liveT>=9?3:liveT+3; el.textContent=L().liveUpdated(liveT); }
},3000);

render();
</script>
</body>
</html>
